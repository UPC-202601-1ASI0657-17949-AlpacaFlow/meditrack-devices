# src/main/resources/application-prod.properties
# This profile is activated for production deployments
# Spring Application Name
spring.application.name=devices

# Spring DataSource Configuration
spring.datasource.url=${MYSQL_CONNECTION}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration
authorization.jwt.secret=WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days=7

# Clinical integration (Devices -> Clinical direct REST for patient thresholds)
app.clinical.base-url=${CLINICAL_SERVICE_URL:https://meditrack-clinical-hph0avgbe2ejbyew.eastus-01.azurewebsites.net}
app.clinical.cache-ttl-seconds=${CLINICAL_THRESHOLD_CACHE_TTL_SECONDS:120}
app.clinical.connect-timeout-seconds=${CLINICAL_CONNECT_TIMEOUT_SECONDS:3}
app.clinical.read-timeout-seconds=${CLINICAL_READ_TIMEOUT_SECONDS:5}