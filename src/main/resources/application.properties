# Spring Application Name
spring.application.name=devices

# Server Configuration
server.port=8080

# http://localhost:8080/swagger-ui/index.html

# Spring DataSource Configuration (override via DB_* env vars in prod/CI)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Spring JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.alpacaflow.meditrack.devices.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# Springdoc / Swagger UI (local): http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Spring Profiles
# Set active profile to 'dev' for development (enables mock user creation endpoints)
# FOR production, REMOVE or set to 'prod' to disable mock endpoints
# spring.profiles.active=dev

# Clinical service (patient thresholds for vital-sign evaluation) — server-to-server REST, not via gateway
app.clinical.base-url=${CLINICAL_SERVICE_URL:https://meditrack-clinical-hph0avgbe2ejbyew.eastus-01.azurewebsites.net}
app.clinical.cache-ttl-seconds=${CLINICAL_THRESHOLD_CACHE_TTL_SECONDS:120}
app.clinical.connect-timeout-seconds=${CLINICAL_CONNECT_TIMEOUT_SECONDS:3}
app.clinical.read-timeout-seconds=${CLINICAL_READ_TIMEOUT_SECONDS:5}
