# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  server:
    build:
      context: .
    ports:
      - "8080:8080"
    # AÑADE ESTA SECCIÓN PARA PASAR LAS VARIABLES AL CONTENEDOR
    environment:
    - DB_URL=${DB_URL}
    - DB_USERNAME=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - CLINICAL_SERVICE_URL=${CLINICAL_SERVICE_URL:-https://meditrack-clinical-hph0avgbe2ejbyew.eastus-01.azurewebsites.net}
    - CLINICAL_THRESHOLD_CACHE_TTL_SECONDS=${CLINICAL_THRESHOLD_CACHE_TTL_SECONDS:-120}
    - CLINICAL_CONNECT_TIMEOUT_SECONDS=${CLINICAL_CONNECT_TIMEOUT_SECONDS:-3}
    - CLINICAL_READ_TIMEOUT_SECONDS=${CLINICAL_READ_TIMEOUT_SECONDS:-5}
    - MQTT_ENABLED=${MQTT_ENABLED:-false}
    - MQTT_BROKER_URL=${MQTT_BROKER_URL:-tcp://meditrack-mosquitto:1883}
    - MQTT_TELEMETRY_TOPIC=${MQTT_TELEMETRY_TOPIC:-meditrack/devices/telemetry}
    - MQTT_CLIENT_ID=${MQTT_CLIENT_ID:-meditrack-devices}
    networks:
      - default
      - meditrack-mqtt

networks:
  meditrack-mqtt:
    external: true
    name: meditrack-mqtt-broker_default

